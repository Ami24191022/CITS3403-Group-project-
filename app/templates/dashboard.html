<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Study Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('main.home') }}">Study Planner</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.templates') }}">Templates</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('main.dashboard') }}">My Plans</a>
          </li>
        </ul>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.home') }}">Log out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="py-4">
    <div class="container">
      <h1 class="fw-bold">My Plans</h1>
      <p class="text-secondary">Your study plans generated from backend data.</p>
    </div>
  </header>

  <!-- Dynamic Plans -->
  <main class="pb-5">
    <div class="container">
      <div class="row g-3">

        {% for plan in plans %}
        <div class="col-lg-6">
          <div class="card h-100 shadow-sm border-0">
            <div class="card-body">

              <h5 class="fw-semibold">{{ plan.title }}</h5>
              <p class="text-secondary small">Auto generated plan</p>

              <span class="badge bg-primary">{{ plan.status }}</span>

            </div>
          </div>
        </div>
        {% endfor %}

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 border-top bg-white">
    <div class="container d-flex justify-content-between">
      <small class="text-secondary">© 2026 Study Planner</small>
      <div class="small">
        <a class="link-secondary" href="{{ url_for('main.templates') }}">Templates</a>
      </div>
    </div>
  </footer>

</body>
</html>
