<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% block title %}Study Planner{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('main.home') }}">Study Planner</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
        aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.home') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.templates') }}">Templates</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.dashboard') }}">My Plans</a>
          </li>
        </ul>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.login') }}">Log in</a>
          <a class="btn btn-warning btn-sm fw-semibold" href="{{ url_for('main.signup') }}">Sign up</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page-specific content -->
  {% block content %}
  {% endblock %}

  <!-- Footer -->
  <footer class="py-4 border-top bg-white">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
      <div class="text-secondary small">© 2026 Study Planner (CITS3403 Group Project)</div>
      <div class="d-flex gap-3 small">
        <a class="link-secondary" href="{{ url_for('main.home') }}">Home</a>
        <a class="link-secondary" href="{{ url_for('main.templates') }}">Templates</a>
        <a class="link-secondary" href="{{ url_for('main.dashboard') }}">My Plans</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {% block scripts %}
  {% endblock %}
</body>
</html>
